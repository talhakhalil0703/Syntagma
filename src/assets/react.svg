<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#262629"/>
      <stop offset="100%" stop-color="#121214"/>
    </linearGradient>
    
    <linearGradient id="synGrad" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#3B82F6"/>
      <stop offset="50%" stop-color="#8B5CF6"/>
      <stop offset="100%" stop-color="#EC4899"/>
    </linearGradient>

    <linearGradient id="dotGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F472B6"/>
      <stop offset="100%" stop-color="#BE185D"/>
    </linearGradient>

    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
    </filter>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="6" stdDeviation="6" flood-color="#000" flood-opacity="0.6"/>
    </filter>
  </defs>

  <rect x="16" y="16" width="224" height="224" rx="54" fill="url(#bgGrad)" />
  <rect x="16" y="16" width="224" height="224" rx="54" fill="none" stroke="#3A3A3C" stroke-width="1.5" opacity="0.6" />

  <path d="M 174,64 L 74,128 L 182,128 L 82,192" fill="none" stroke="url(#synGrad)" stroke-width="36" stroke-linecap="round" stroke-linejoin="round" filter="url(#glow)" opacity="0.4" />

  <path d="M 174,64 L 74,128 L 182,128 L 82,192" fill="none" stroke="url(#synGrad)" stroke-width="36" stroke-linecap="round" stroke-linejoin="round" filter="url(#shadow)" />

  <path d="M 174,64 L 74,128 L 182,128 L 82,192" fill="none" stroke="#FFFFFF" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" opacity="0.4" />

  <circle cx="82" cy="192" r="18" fill="url(#dotGrad)" filter="url(#shadow)" />
  <circle cx="82" cy="192" r="18" fill="none" stroke="#FFFFFF" stroke-width="1.5" opacity="0.4" />
</svg>
